<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAS CRUD Manager</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --success: #22c55e;
      --border: #334155;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      margin: 0;
      padding: 2rem;
      line-height: 1.5;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    /* Buttons */
    .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-danger {
      background-color: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-danger:hover {
      background-color: var(--danger);
      color: white;
    }

    .btn-edit {
      background-color: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-edit:hover {
      border-color: var(--text-primary);
      color: var(--text-primary);
    }

    /* Table */
    .table-container {
      background: var(--card-bg);
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      overflow-x: auto;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    th,
    td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background-color: #1a2333;
      color: var(--text-secondary);
      font-weight: 600;
      position: sticky;
      top: 0;
    }

    tr:hover {
      background-color: #263345;
    }

    td {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Status Badge */
    .badge {
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-new {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }

    .status-fixed {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .status-pending {
      background: rgba(234, 179, 8, 0.2);
      color: #facc15;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      /* Flex when active */
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .modal {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal h2 {
      margin-top: 0;
      margin-bottom: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .full-width {
      grid-column: span 2;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.75rem;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: white;
      font-family: inherit;
      box-sizing: border-box;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 2rem;
    }

    /* Loading Spinner */
    .loading {
      display: none;
      justify-content: center;
      padding: 2rem;
      color: var(--text-secondary);
    }
  </style>
</head>

<body>

  <div class="container">
    <header>
      <div>
        <h1>GAS 報表系統</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">連結 Google Sheets 後端</p>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        新增資料
      </button>
    </header>

    <div id="loading" class="loading">
      <svg class="animate-spin" style="animation: spin 1s linear infinite; margin-right: 0.5rem;" width="24" height="24"
        fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
        </path>
      </svg>
      載入中...
    </div>

    <div class="table-container">
      <table id="dataTable">
        <thead>
          <!-- JS Generated Headers -->
        </thead>
        <tbody>
          <!-- JS Generated Rows -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <h2 id="modalTitle">新增資料</h2>
      <form id="dataForm">
        <input type="hidden" id="editId">
        <input type="hidden" id="actionType" value="create">

        <div class="form-grid">
          <div class="form-group">
            <label>Module 模組</label>
            <input type="text" id="module" required>
          </div>
          <div class="form-group">
            <label>Function 功能</label>
            <input type="text" id="functionName" required>
          </div>

          <div class="form-group">
            <label>Reporter 通報人</label>
            <input type="text" id="reporter" required>
          </div>
          <div class="form-group">
            <label>URL 連結</label>
            <input type="text" id="url">
          </div>

          <div class="form-group full-width">
            <label>Code / Error Code</label>
            <input type="text" id="code">
          </div>

          <div class="form-group full-width">
            <label>Description 描述</label>
            <textarea id="description" rows="3"></textarea>
          </div>

          <!-- Fixer Fields (Only for Edit) -->
          <div class="form-grid full-width" id="fixerSection"
            style="display:none; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.5rem;">
            <div class="form-group">
              <label>Status 狀態</label>
              <select id="status">
                <option value="New">New</option>
                <option value="Processing">Processing</option>
                <option value="Fixed">Fixed</option>
                <option value="Closed">Closed</option>
              </select>
            </div>
            <div class="form-group">
              <label>Fixer 處理人</label>
              <input type="text" id="fixer">
            </div>
            <div class="form-group full-width">
              <label>Fix Note 處理備註</label>
              <textarea id="fixNote" rows="2"></textarea>
            </div>
          </div>

        </div>

        <div class="modal-actions">
          <button type="button" class="btn" style="background: #334155;" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <script>
	  const API_URL = "https://script.google.com/macros/s/AKfycbxsf-HLoqepP78E129TLe5drFkD6VaIaHWU3HaZOJ9isKA83b2EWtRfwISJEpCkQtO05w/exec";
    // Config: Column Mapping based on Code.gs structure
    // [ID, Status, Module, Function, Code, Url, Reporter, Description, Timestamp, Fixer, FixNote, FixTime]
    // The API (doGet) returns objects with keys identical to the header row of the Google Sheet.
    // We'll need to adapt dynamically or assume keys.
    // Based on user context, we will infer keys from the first response, but defining a schema helps order.

    // Global state
    let currentData = [];

    document.addEventListener('DOMContentLoaded', () => {
      fetchData();

      // Close modal on outside click
      document.getElementById('modalOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'modalOverlay') closeModal();
      });
    });

    async function fetchData() {
      showLoading(true);
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        currentData = data;
        renderTable(data);
      } catch (err) {
        alert("讀取資料失敗: " + err.message);
      } finally {
        showLoading(false);
      }
    }

    function renderTable(data) {
      const thead = document.querySelector('#dataTable thead');
      const tbody = document.querySelector('#dataTable tbody');

      tbody.innerHTML = '';
      thead.innerHTML = '';

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="100%" style="text-align:center;">目前沒有資料</td></tr>';
        return;
      }

      // Define columns to show (and ignoring others or ordering them)
      // If we want to be dynamic:
      const keys = Object.keys(data[0]);
      // Let's filter out 'ID' from display if we want, or keep it.
      // Assuming ID is important for actions.

      // Header
      const trHead = document.createElement('tr');
      keys.forEach(k => {
        const th = document.createElement('th');
        th.textContent = k;
        trHead.appendChild(th);
      });
      // Action Header
      const thAction = document.createElement('th');
      thAction.textContent = "操作";
      thAction.style.textAlign = "right";
      trHead.appendChild(thAction);
      thead.appendChild(trHead);

      // Body
      data.forEach((row, index) => {
        const tr = document.createElement('tr');

        keys.forEach(k => {
          const td = document.createElement('td');
          let content = row[k];

          // Format Status
          if (k.toLowerCase().includes('status')) {
            const statusClass = content === 'New' ? 'status-new' : (content === 'Fixed' ? 'status-fixed' : 'status-pending');
            td.innerHTML = `<span class="badge ${statusClass}">${content}</span>`;
          } else if (k.toLowerCase().includes('url') && content && content.startsWith('http')) {
            td.innerHTML = `<a href="${content}" target="_blank" style="color:var(--accent); text-decoration:none;">連結</a>`;
          } else {
            td.textContent = content;
          }
          tr.appendChild(td);
        });

        // Actions
        const tdAction = document.createElement('td');
        tdAction.style.textAlign = "right";
        tdAction.innerHTML = `
                <button class="btn btn-edit" onclick="openEditModal(${index})">編輯</button>
                <button class="btn btn-danger" onclick="deleteItem('${row.ID || row.id}', this)">刪除</button>
            `;
        tr.appendChild(tdAction);
        tbody.appendChild(tr);
      });
    }

    // --- Modal Logic ---

    function openCreateModal() {
      document.getElementById('dataForm').reset();
      document.getElementById('actionType').value = 'create';
      document.getElementById('modalTitle').textContent = '新增資料';
      document.getElementById('fixerSection').style.display = 'none';

      document.getElementById('modalOverlay').classList.add('active');
    }

    function openEditModal(index) {
      const item = currentData[index];
      const form = document.getElementById('dataForm');

      document.getElementById('actionType').value = 'update';
      document.getElementById('modalTitle').textContent = '編輯資料';
      document.getElementById('editId').value = item.ID || item.id; // Case sensitive check

      // Populate fields (Matching IDs to Keys loosely)
      // Note: The GAS keys might be capitalizing differently.
      // We will try to match keys Case-Insensitively or exact map.

      const setVal = (id, keys) => {
        // Find key in item that matches
        const key = Object.keys(item).find(k => keys.includes(k.toLowerCase()));
        if (key) document.getElementById(id).value = item[key];
      };

      setVal('module', ['module']);
      setVal('functionName', ['function', 'functionname', 'func']);
      setVal('code', ['code']);
      setVal('url', ['url']);
      setVal('reporter', ['reporter']);
      setVal('description', ['description', 'desc']);

      setVal('status', ['status']);
      setVal('fixer', ['fixer']);
      setVal('fixNote', ['fixnote']);

      document.getElementById('fixerSection').style.display = 'grid'; // Show fixer fields
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // --- CRUD Actions ---

    document.getElementById('dataForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const saveBtn = document.getElementById('saveBtn');
      const originalText = saveBtn.textContent;
      saveBtn.textContent = '處理中...';
      saveBtn.disabled = true;

      const action = document.getElementById('actionType').value;

      const payload = {
        action: action,
        module: document.getElementById('module').value,
        functionName: document.getElementById('functionName').value,
        code: document.getElementById('code').value,
        url: document.getElementById('url').value,
        reporter: document.getElementById('reporter').value,
        description: document.getElementById('description').value
      };

      if (action === 'update') {
        payload.id = document.getElementById('editId').value;
        payload.status = document.getElementById('status').value;
        payload.fixer = document.getElementById('fixer').value;
        payload.fixNote = document.getElementById('fixNote').value;
        payload.fixTime = new Date().toLocaleString();
      }

      try {
        // IMPORTANT: No Content-Type header to avoid CORS preflight options
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        // Allow some time for GAS to reflect or just reload
        // Ideally backend returns new data, but here we just refetch
        closeModal();
        fetchData();
      } catch (err) {
        alert("操作失敗: " + err.message);
      } finally {
        saveBtn.textContent = originalText;
        saveBtn.disabled = false;
      }
    });

    async function deleteItem(id, btnElement) {
      if (!confirm('確定要刪除這筆資料嗎？')) return;

      btnElement.textContent = '刪除中...';
      btnElement.disabled = true;

      try {
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: 'delete',
            id: id
          })
        });
        fetchData();
      } catch (err) {
        alert("刪除失敗: " + err.message);
        btnElement.textContent = '刪除';
        btnElement.disabled = false;
      }
    }

    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'flex' : 'none';
      document.getElementById('dataTable').style.opacity = show ? '0.5' : '1';
    }

    // CSS Keyframes
    const styleSheet = document.createElement("style");
    styleSheet.innerText = `
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    `;
    document.head.appendChild(styleSheet);

  </script>

</body>

</html>
