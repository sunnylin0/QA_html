<!DOCTYPE html>
<html lang="zh-Hant">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>QA 問題回報系統</title>
	<!-- Cache-busted stylesheet -->
	<link rel="stylesheet" href="style.css?v=2">
</head>

<body>

	<div id="globalLoading"></div>

	<nav>
		<div class="nav-brand">QA Tracker</div>
		<div class="nav-links">
			<button class="active" data-cmd="switchTab" data-arg="report">問題回報</button>
			<button data-cmd="switchTab" data-arg="list">修正列表</button>
		</div>
		<div style="display:flex; align-items:center; gap:1rem;">
			<div class="user-profile" data-cmd="editUser">
				<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
					<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
						d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
				</svg>
				<span id="userNameDisplay">Guest</span>
			</div>
			<button class="btn btn-sm btn-danger" data-cmd="closeExtension">關閉 (Esc)</button>
		</div>
	</nav>

	<div class="container">

		<!-- Tab: Report Issue -->
		<div id="tab-report" class="tab-content active">
			<div class="card new">
				<h2 id="reportFormTitle" style="margin-top:0; color:var(--accent);">新增回報</h2>
				<form id="reportForm">
					<input type="hidden" id="r_id">
					<div class="form-grid">
						<div class="form-group">
							<label>Status 狀態</label>
							<select id="r_status">
								<option value="New" selected>New</option>
								<option value="Fixed">Fixed</option>
								<option value="Closed">Closed</option>
								<option value="OK">OK</option>
								<option value="Revise">Revise</option>
							</select>
						</div>
						<div class="form-group">
							<label>Module 模組</label>
							<input type="text" id="r_module" required placeholder="例如：會員系統">
						</div>
						<div class="form-group">
							<label>Function 功能</label>
							<input type="text" id="r_function" required placeholder="例如：登入頁面">
						</div>
						<div class="form-group">
							<label>Code / Error Code 代碼</label>
							<input type="text" id="r_code" placeholder="例如：ERR-001">
						</div>
						<div class="form-group">
							<label>URL 連結</label>
							<input type="text" id="r_url" placeholder="相關頁面連結">
						</div>
						<div class="form-group full">
							<label>Description 描述</label>
							<textarea id="r_description" rows="3" required placeholder="請詳細描述問題發生步驟..."></textarea>
						</div>
					</div>
					<div style="text-align: right; margin-top: 1rem; display:flex; justify-content:flex-end; gap:1rem;">
						<button type="button" class="btn btn-secondary" id="r_cancelBtn" style="display:none;"
							data-cmd="cancelReportEdit">取消編輯</button>
						<button type="submit" id="r_submitBtn" class="btn btn-primary">提交回報</button>
					</div>
				</form>
			</div>

			<div class="recent-list">
				<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
					<h3 style="color:var(--text-secondary); margin:0;">最近回報紀錄 (Top 10)</h3>
					<div class="search-input" style="width:300px;">
						<input type="text" id="reportSearchInput" placeholder="搜尋回報紀錄..."
							data-input-cmd="handleReportSearch">
					</div>
				</div>

				<div class="card" style="padding:0; overflow-x:auto;">
					<table class="simple-table" id="reportTable">
						<thead>
							<tr>
								<th>ID</th>
								<th>Status</th>
								<th>Module</th>
								<th>Function</th>
								<th>Description</th>
								<th style="width:100px;">Time</th>
								<th style="width:220px; text-align:right;">Actions</th>
							</tr>
						</thead>
						<tbody id="recentReportBody">
							<tr>
								<td colspan="7" style="text-align:center;">載入中...</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>

		<!-- Tab: Fix List -->
		<div id="tab-list" class="tab-content">
			<div class="filter-bar" style="display:flex; align-items:center; gap:1rem;">
				<div class="search-input" style="flex:1; display:flex; gap:0.5rem; max-width:70%;">
					<!-- Inline Search + Filter -->
					<input type="text" id="searchInput" placeholder="搜尋 ID, 模組, 描述..." data-input-cmd="handleSearch"
						style="flex:1;">
					<select id="statusFilter" data-change-cmd="handleFilter" style="width:150px;">
						<option value="All">所有狀態</option>
						<option value="New">New</option>
						<option value="Fixed">Fixed</option>
						<option value="Closed">Closed</option>
						<option value="OK">OK</option>
						<option value="Revise">Revise</option>

					</select>
				</div>

				<div style="margin-left:auto; display:flex; gap:0.5rem; align-items:center;">
					<select id="pageSizeSelect" data-change-cmd="changePageSize" style="width:auto; padding:0.4rem;">
						<option value="10">10 筆/頁</option>
						<option value="20" selected>20 筆/頁</option>
						<option value="50">50 筆/頁</option>
						<option value="100">100 筆/頁</option>
					</select>
					<button class="btn btn-secondary btn-sm" data-cmd="refreshData">重新整理</button>
				</div>
			</div>
			<div style="margin-bottom:0.5rem; font-size:0.9rem; color:var(--text-secondary); text-align:right;">
				<span id="recordCount"></span>
			</div>

			<div id="dataListContainer" class="card" style="padding:0; overflow-x:auto;">
				<!-- Table View -->
				<table class="simple-table">
					<thead>
						<tr>
							<th style="width:80px;">ID</th>
							<th style="width:80px;">Status</th>
							<th style="width:120px;">Module</th>
							<th style="width:150px;">Function</th>
							<th>Description</th>
							<th style="width:100px;">Reporter</th>
							<th style="width:140px; text-align:right;">Actions</th>
						</tr>
					</thead>
					<tbody id="fixListBody">
						<!-- JS Injected -->
					</tbody>
				</table>
			</div>

			<div id="pagination"
				style="margin-top:1.5rem; display:flex; justify-content:center; gap:1rem; align-items:center;">
				<button class="btn btn-secondary btn-sm" data-cmd="prevPage">&lt; 上一頁</button>
				<span id="pageInfo" style="color:var(--text-secondary); font-size:0.9rem;">Page 1</span>
				<button class="btn btn-secondary btn-sm" data-cmd="nextPage">下一頁 &gt;</button>
			</div>
		</div>

	</div>

	<!-- Fix Modal -->
	<div id="fixModal" class="modal-overlay">
		<div class="modal">
			<h2 id="modalTitle">編輯資料</h2>
			<form id="fixForm">
				<input type="hidden" id="edit_id">

				<div class="form-grid">
					<!-- Added Readonly Fields -->
					<div class="form-group">
						<label>Module 模組</label>
						<input type="text" id="edit_module" readonly style="opacity:0.7; cursor:not-allowed;">
					</div>
					<div class="form-group">
						<label>Function 功能</label>
						<input type="text" id="edit_function" readonly style="opacity:0.7; cursor:not-allowed;">
					</div>
					<div class="form-group full">
						<label>Code / Error Code 代碼</label>
						<input type="text" id="edit_code" readonly style="opacity:0.7; cursor:not-allowed;">
					</div>
					<div class="form-group full">
						<label>URL 連結</label>
						<input type="text" id="edit_url" readonly style="opacity:0.7; cursor:not-allowed;">
					</div>

					<div class="form-group">
						<label>Status 狀態</label>
						<select id="edit_status" data-change-cmd="checkStatusColor">
							<option value="New">New</option>
							<option value="Fixed">Fixed</option>
							<option value="Closed">Closed</option>
							<option value="OK">OK</option>
							<option value="Revise">Revise</option>
						</select>
					</div>
					<div class="form-group">
						<label>Fixer 處理人</label>
						<input type="text" id="edit_fixer">
					</div>
					<div class="form-group full">
						<label>Fix Note 處理備註</label>
						<textarea id="edit_fixNote" rows="3"></textarea>
					</div>

					<!-- Readonly Info -->
					<div class="form-group full"
						style="border-top:1px solid var(--border); padding-top:1rem; margin-top:0.5rem;">
						<label>原始問題描述</label>
						<div id="edit_desc_display"
							style="color:var(--text-secondary); white-space:pre-wrap; font-size:0.9rem; background:rgba(0,0,0,0.2); padding:1rem; border-radius:0.5rem;">
						</div>
					</div>

					<div class="form-group full" id="linkContainer" style="display:none;">
						<a id="edit_link" href="#" target="_blank" class="btn btn-secondary"
							style="width:100%; justify-content:center;">開啟相關連結 ↗</a>
					</div>
				</div>

				<div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:2rem;">
					<button type="button" class="btn btn-secondary" data-cmd="closeModal">取消</button>
					<button type="submit" class="btn btn-primary">儲存變更</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Cache-busted script -->
	<script src="src/app.js?v=2"></script>
</body>

</html>
